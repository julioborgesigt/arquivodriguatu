<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Procedimento e Consultar Movimentação</title>

    <!-- Incluindo bibliotecas jsPDF e QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

    <!-- Incluindo a biblioteca HTML5 QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

    <!-- Arquivo de Estilos CSS Externo -->
    <link rel="stylesheet" href="style.css">

    <!-- Arquivo JS -->
    <script src="/script.js" defer></script>

    

</head>
<body>
    <!-- Formulário de Login/Cadastro -->
    <div id="auth-container">
        <h2>Login ou Cadastro</h2>
        <form id="auth-form">
            <label for="username">Usuário:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" required>
            <button type="button" onclick="login()">Entrar</button>
            <button type="button" onclick="register()">Cadastrar</button>
            <!-- Botão Administrador -->
            <button type="button" id="admin-btn" onclick="window.location.href='/login_admin.html'">Administrador</button>
        </form>
    </div>

        <!-- Interface após login -->
        <div id="app-container" style="display: none;">
            <div id="main-container">
    <h1>Bem-vindo</h1>
    <h2>Escolha uma opção abaixo</h2>

    <!-- Formulários para cada funcionalidade -->
    <div id="gerarPDF-form" class="formulario">
        <h3>Gerar Procedimento</h3>
        <form>
            <label for="numeroPDF">Número do Procedimento:</label>
            <input type="text" id="numeroPDF" placeholder="Ex.: 123-45678/2024">
            <button type="button" onclick="gerarPDF()">Gerar PDF</button>
        </form>
    </div>

    <div id="lerQrcode-form" class="formulario">
        <h3>Ler QR Code</h3>
        <form>
            <button type="button" onclick="lerQRCode()">Iniciar Leitura</button>
        </form>
    </div>

    <div id="consultarMovimentacao-form" class="formulario">
        <h3>Consultar Movimentação</h3>
        <form>
            <label for="numeroConsulta">Número do Procedimento:</label>
            <input type="text" id="numeroConsulta" placeholder="Ex.: 123-45678/2024">
            <button type="button" onclick="consultarMovimentacao()">Consultar</button>
        </form>
    </div>

    <div id="transferirProcesso-form" class="formulario">
        <h3>Transferir Processo</h3>
        <form>
            <label for="loginDestinatario">Login Destinatário:</label>
            <input type="text" id="loginDestinatario">
            <button type="button" onclick="solicitarTransferencia()">Transferir</button>
        </form>
    </div>

    <div id="solicitacoes-form" class="formulario">
        <h3>Solicitações de Transferência</h3>
        <div id="solicitacoes-pendentes"></div>
    </div>

    <div id="converter-form" class="formulario">
        <h3>Conversão de Procedimento</h3>
        <form>
            <label for="numeroConverter">Número do Procedimento:</label>
            <input type="text" id="numeroConverter" placeholder="Ex.: 123-45678/2024">
            <button type="button" onclick="converterProcedimento()">Converter</button>
        </form>
    </div>
</div>

<!-- Barra inferior de navegação -->
<div class="bottom-nav">
    <button onclick="mostrarFormulario('gerarPDF-form')"><i>📄</i>Gerar PDF</button>
    <button onclick="mostrarFormulario('lerQrcode-form')"><i>📷</i>Ler QR Code</button>
    <button onclick="mostrarFormulario('consultarMovimentacao-form')"><i>🔍</i>Consultar</button>
    <button onclick="mostrarFormulario('transferirProcesso-form')"><i>🔄</i>Transferir</button>
    <button onclick="mostrarFormulario('solicitacoes-form')"><i>📨</i>Solicitações</button>
    <button onclick="mostrarFormulario('converter-form')"><i>🔄</i>Conversão</button>
</div>
    
   
   

 
</body>
</html>
